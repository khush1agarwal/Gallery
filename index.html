<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corner Art Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="passwordScreen">
        <div class="password-card">
            <h1>Welcome to the Gallery</h1>

            <p>
                This exhibition has been curated for a special guest.
                <br><br>
                Enter the password to begin.
            </p>

            <input
                id="passwordInput"
                type="password"
                placeholder="Password">

            <button onclick="enterGallery()">
                Enter
            </button>

            <p id="error"></p>
        </div>
    </div>

    <main class="gallery-shell">
        <section class="room" id="room">
            <div class="wall left-wall" id="leftWall"></div>
            <div class="corner" id="corner"></div>
            <div class="wall right-wall" id="rightWall"></div>
            <div class="baseboard"></div>
            <div class="floor"></div>
        </section>
    </main>

    <div class="scroll-note">Scroll sideways to move through the gallery</div>

    <div class="modal" id="modal">
        <button class="close" type="button" id="closeModal">&times;</button>
        <div class="modal-card" id="modalCard">
            <img id="modalImage" alt="">
            <div class="modal-caption" id="modalCaption"></div>
        </div>
    </div>

    <button
        class="gramophone"
        id="gramophoneButton"
        type="button"
        aria-label="Play Music"
        data-tooltip="Play Music">
        <span class="gramophone-horn"></span>
        <span class="gramophone-neck"></span>
        <span class="gramophone-base">
            <span class="gramophone-record"></span>
            <span class="gramophone-arm"></span>
        </span>
    </button>

    <audio id="backgroundMusic" src="audio/background.mp3" preload="none"></audio>

    <script src="script.js"></script>
</body>
</html>
